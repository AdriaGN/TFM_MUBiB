[tool.ruff]
line-length = 88

[tool.ruff.lint]
select = ["E", "F", "I", "D", "C90", "N",]
ignore = ["D100", "D104", "D107"]

[tool.ruff.lint.pydocstyle]
convention = "google"

[tool.ruff.lint.mccabe]
max-complexity = 10

[tool.mypy]
disallow_untyped_defs = true
warn_return_any = true
warn_unreachable = true
ignore_missing_imports = true